<svg xmlns="http://www.w3.org/2000/svg" width="150" height="175" viewBox="0 0 150 175">
  <defs>
    <linearGradient id="dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe2ff"/>
      <stop offset="0.35" stop-color="#5b9bff"/>
      <stop offset="1" stop-color="#1c52c8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4d9bff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4d9bff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- glow + sweeping beams -->
  <ellipse cx="75" cy="78" rx="74" ry="74" fill="url(#glow)"/>
  <polygon points="75,78 6,42 4,72" fill="#7db6ff" opacity="0.35"/>
  <polygon points="75,78 144,42 146,72" fill="#7db6ff" opacity="0.35"/>
  <!-- dome -->
  <path d="M34 122 L34 78 A41 46 0 0 1 116 78 L116 122 Z" fill="url(#dome)" stroke="#16409e" stroke-width="3"/>
  <!-- fresnel vertical ridges -->
  <g stroke="#dbe9ff" stroke-width="2" opacity="0.45">
    <line x1="52" y1="52" x2="52" y2="120"/>
    <line x1="64" y1="44" x2="64" y2="120"/>
    <line x1="75" y1="41" x2="75" y2="120"/>
    <line x1="86" y1="44" x2="86" y2="120"/>
    <line x1="98" y1="52" x2="98" y2="120"/>
  </g>
  <!-- shine -->
  <path d="M48 70 Q51 95 51 118" stroke="#ffffff" stroke-width="6" opacity="0.5" fill="none" stroke-linecap="round"/>
  <!-- base -->
  <rect x="26" y="118" width="98" height="16" rx="6" fill="#3a3f47"/>
  <rect x="26" y="118" width="98" height="6" rx="3" fill="#b7bdc7"/>
  <path d="M40 134 L110 134 L102 158 L48 158 Z" fill="#23262b"/>
  <rect x="44" y="156" width="62" height="9" rx="3" fill="#15171a"/>
</svg>
